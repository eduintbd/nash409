# Anonymous (token, not JWT, is the credential).
[functions.verify-reset-token]
verify_jwt = false

# Authenticated-user endpoints — block unauthenticated callers at the gateway.
[functions.send-tenant-agreement]
verify_jwt = true

[functions.admin-reset-password]
verify_jwt = true

[functions.send-welcome-email]
verify_jwt = true

[functions.ai-assistant]
verify_jwt = true

# Triggered by the scheduled cron with a service-role JWT.
[functions.generate-monthly-rent]
verify_jwt = true
